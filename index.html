<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amtrak Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { overflow: hidden; }
  .train-marker { background: none !important; border: none !important; }
  .leaflet-control-attribution {
    font-size: 9px !important; background: rgba(0,0,0,0.55) !important;
    color: #666 !important; padding: 2px 6px !important;
  }
  .leaflet-control-attribution a { color: #888 !important; }
  .leaflet-control-zoom a {
    background: rgba(15,20,32,0.9) !important;
    color: #aaa !important; border-color: #2a3550 !important;
  }
  .leaflet-control-zoom a:hover { background: rgba(30,42,64,0.9) !important; color: #fff !important; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
  input::placeholder { opacity: 0.35; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
    50% { box-shadow: 0 0 0 5px transparent; opacity: 0.7; }
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fadeIn 0.25s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useImperativeHandle } = React;

/* ── THEMES ─────────────────────────────────────────────────────────────── */
const THEMES = {
  dark: {
    id:'dark', label:'Dark',
    bg:'#080c14', surface:'#0d1220', elevated:'#131b2e', border:'#1c2740',
    accent:'#4f8eff', accentDim:'rgba(79,142,255,0.12)',
    text:'#dce4f5', sub:'#4a5a78', muted:'#1c2740',
    ok:'#2dd68c', warn:'#f5a623', err:'#ef5454',
    font:"'Space Grotesk', system-ui, sans-serif",
    mono:"'JetBrains Mono', monospace",
    up:false, br:'6px',
    tile:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  },
  orange: {
    id:'orange', label:'◈ Retro',
    bg:'#0d0700', surface:'#180d00', elevated:'#241400', border:'#552500',
    accent:'#ff7c00', accentDim:'rgba(255,124,0,0.14)',
    text:'#ffc97a', sub:'#6e380c', muted:'#381800',
    ok:'#ffbb00', warn:'#ff7c00', err:'#ff2a00',
    font:"'JetBrains Mono', monospace", mono:"'JetBrains Mono', monospace",
    up:false, br:'2px',
    tile:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  },
  green: {
    id:'green', label:'◈ Phosphor',
    bg:'#000f00', surface:'#001700', elevated:'#002100', border:'#003a00',
    accent:'#00ff41', accentDim:'rgba(0,255,65,0.1)',
    text:'#00e035', sub:'#006022', muted:'#002600',
    ok:'#00ff41', warn:'#88ff00', err:'#ff4400',
    font:"'JetBrains Mono', monospace", mono:"'JetBrains Mono', monospace",
    up:false, br:'2px',
    tile:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  },
  dos: {
    id:'dos', label:'◈ DOS',
    bg:'#000080', surface:'#0000aa', elevated:'#0000c8', border:'#4444cc',
    accent:'#ffff55', accentDim:'rgba(255,255,85,0.18)',
    text:'#ffffff', sub:'#aaaaaa', muted:'#000060',
    ok:'#55ff55', warn:'#ffff55', err:'#ff5555',
    font:"'Courier New', monospace", mono:"'Courier New', monospace",
    up:true, br:'0px',
    tile:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  },
};

const RATES     = [5, 10, 15];
const API       = 'https://api-v3.amtraker.com/v3';
const HDEG      = { N:0, NE:45, E:90, SE:135, S:180, SW:225, W:270, NW:315 };
const TRAIL_MAX = 6;
const MOBILE_BP = 640;

/* ── UTILS ──────────────────────────────────────────────────────────────── */
const u = (T, s) => (T.up && typeof s === 'string') ? s.toUpperCase() : s;

function fmtTime(ts, tz) {
  if (!ts) return '——';
  try {
    return new Date(ts).toLocaleTimeString('en-US', {
      hour:'2-digit', minute:'2-digit', hour12:true, timeZone: tz || undefined,
    });
  } catch { return '——'; }
}

function delayMins(actual, sched) {
  if (!actual || !sched) return null;
  return Math.round((new Date(actual) - new Date(sched)) / 60000);
}

function fmtCountdown(sec) {
  const m = String(Math.floor(Math.max(0, sec) / 60)).padStart(2,'0');
  const s = String(Math.max(0, sec) % 60).padStart(2,'0');
  return `${m}:${s}`;
}

function mkIcon(T, heading, size) {
  const sz  = size || 36;
  const deg = HDEG[heading] ?? 0;
  const c = T.accent, bg = T.bg;
  const html = `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 36 36">
    <g transform="rotate(${deg},18,18)">
      <polygon points="18,3 28,33 18,25 8,33" fill="${c}" stroke="${bg}" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="18" cy="18" r="5" fill="${bg}" stroke="${c}" stroke-width="2"/>
    </g></svg>`;
  const half = sz / 2;
  return L.divIcon({ html, className:'train-marker', iconSize:[sz,sz], iconAnchor:[half,half] });
}

/* ── GHOST MARKERS ──────────────────────────────────────────────────────── */
function rebuildGhosts(map, ghostsRef, trail, T) {
  ghostsRef.current.forEach(g => g.remove());
  ghostsRef.current = [];
  trail.forEach((pos, i) => {
    const opacity = ((i + 1) / (trail.length + 1)) * 0.52;
    const mrk = L.marker([pos.lat, pos.lon], {
      icon: mkIcon(T, pos.heading, 28),
      interactive:false,
      zIndexOffset:-(trail.length - i) * 100,
    }).addTo(map);
    mrk.setOpacity(opacity);
    ghostsRef.current.push(mrk);
  });
}

/* ── DELAY CHART ─────────────────────────────────────────────────────────── */
function DelayChart({ stations, theme: T }) {
  const boxRef = useRef(null);
  const [cw, setCw] = useState(0);

  useEffect(() => {
    if (!boxRef.current) return;
    setCw(boxRef.current.offsetWidth);
    const ro = new ResizeObserver(([e]) => setCw(e.contentRect.width));
    ro.observe(boxRef.current);
    return () => ro.disconnect();
  }, []);

  // Build dataset — one entry per station with actual time data
  const data = stations.map((s, idx) => {
    const ad = delayMins(s.arr, s.schArr);
    const dd = delayMins(s.dep, s.schDep);
    const delay = ad !== null ? ad : dd;
    return delay !== null ? { idx, code: s.code, name: s.name, delay } : null;
  }).filter(Boolean);

  if (data.length < 2) return null;

  // Chart geometry
  const H   = 96;
  const pT  = 6;
  const pB  = 20;  // x-axis label space
  const pL  = 30;  // y-axis label space
  const pR  = 6;
  const plotW = Math.max(cw - pL - pR, 10);
  const plotH = H - pT - pB;

  const maxAbs = Math.max(...data.map(d => Math.abs(d.delay)), 5);
  const zeroY  = pT + plotH * 0.7; // 70% of space above zero (trains are usually late not early)
  const scaleU = (zeroY - pT) / maxAbs;      // px per min, above zero
  const scaleD = (pT + plotH - zeroY) / maxAbs; // px per min, below zero

  const n    = data.length;
  const barW = Math.max(2, Math.min(18, (plotW / n) - 1));
  const step = plotW / n;

  const barColor = d => d <= 0 ? T.ok : d <= 15 ? T.warn : T.err;
  const labelEvery = Math.max(1, Math.ceil(n / 9));

  const yLabel = v => {
    const px = zeroY - v * (v >= 0 ? scaleU : -scaleD);
    return Math.round(px);
  };

  return (
    <div style={{
      borderBottom:`1px solid ${T.border}`, paddingBottom:'12px', marginBottom:'14px',
    }}>
      {/* Chart header */}
      <div style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        marginBottom:'6px',
      }}>
        <span style={{ fontSize:'9px', textTransform:'uppercase', letterSpacing:'0.14em', color:T.sub, fontFamily:T.mono }}>
          {u(T,'Delay vs. Schedule')}
        </span>
        <div style={{ display:'flex', gap:'8px' }}>
          {[{c:T.ok,l:'Early/On time'},{c:T.warn,l:'≤15m late'},{c:T.err,l:'>15m late'}].map(({c,l}) => (
            <div key={l} style={{ display:'flex', alignItems:'center', gap:'3px' }}>
              <div style={{ width:'6px', height:'6px', borderRadius:'1px', background:c, flexShrink:0 }} />
              <span style={{ fontSize:'7px', color:T.sub, fontFamily:T.mono }}>{u(T,l)}</span>
            </div>
          ))}
        </div>
      </div>

      {/* SVG chart */}
      <div ref={boxRef} style={{ width:'100%' }}>
        {cw > 20 && (
          <svg width={cw} height={H} style={{ display:'block', overflow:'visible' }}>
            {/* Y-axis labels */}
            <text x={pL-4} y={pT+5} textAnchor="end" fontSize="8" fill={T.sub} fontFamily="monospace">+{maxAbs}m</text>
            <text x={pL-4} y={zeroY+3} textAnchor="end" fontSize="8" fill={T.sub} fontFamily="monospace">0</text>
            <text x={pL-4} y={pT+plotH+3} textAnchor="end" fontSize="8" fill={T.sub} fontFamily="monospace">-{Math.round(maxAbs*(1-0.7)/0.7)}m</text>

            {/* Grid: zero line */}
            <line x1={pL} y1={zeroY} x2={pL+plotW} y2={zeroY}
              stroke={T.sub} strokeWidth={0.5} strokeDasharray="3,4" opacity={0.6} />
            {/* Subtle grid at +half */}
            <line x1={pL} y1={yLabel(maxAbs * 0.5)} x2={pL+plotW} y2={yLabel(maxAbs * 0.5)}
              stroke={T.border} strokeWidth={0.5} opacity={0.4} />

            {/* Bars */}
            {data.map((d, i) => {
              const cx   = pL + i * step + step / 2;
              const x    = cx - barW / 2;
              const pixH = Math.abs(d.delay) * (d.delay >= 0 ? scaleU : scaleD);
              const y    = d.delay >= 0 ? zeroY - pixH : zeroY;
              const showLabel = i % labelEvery === 0;
              return (
                <g key={d.code}>
                  <rect x={x} y={y} width={barW} height={Math.max(pixH, 1.5)}
                    fill={barColor(d.delay)} opacity={0.82} rx={barW > 4 ? 1 : 0}>
                    <title>{d.name} ({d.code}): {d.delay > 0 ? '+' : ''}{d.delay}m</title>
                  </rect>
                  {showLabel && (
                    <text x={cx} y={H - 3} textAnchor="middle"
                      fontSize="7" fill={T.sub} fontFamily="monospace">
                      {d.code.slice(0,3)}
                    </text>
                  )}
                </g>
              );
            })}
          </svg>
        )}
      </div>
    </div>
  );
}

/* ── MAP ────────────────────────────────────────────────────────────────── */
const TrainMap = React.forwardRef(function TrainMap({ lat, lon, heading, trail, theme: T }, ref) {
  const elRef    = useRef(null);
  const mapRef   = useRef(null);
  const mrkRef   = useRef(null);
  const tilRef   = useRef(null);
  const ghostsRef= useRef([]);
  const hdgRef   = useRef(heading);
  useEffect(() => { hdgRef.current = heading; }, [heading]);

  useImperativeHandle(ref, () => ({
    invalidateSize: () => { if (mapRef.current) mapRef.current.invalidateSize(); },
  }));

  // Init
  useEffect(() => {
    if (!elRef.current || mapRef.current) return;
    const map = L.map(elRef.current, { zoomControl:false, attributionControl:false })
      .setView([lat, lon], 8);
    L.control.zoom({ position:'bottomright' }).addTo(map);
    L.control.attribution({ prefix:false }).addTo(map);
    const tile = L.tileLayer(T.tile, {
      attribution:'© <a href="https://carto.com">CartoDB</a> © OpenStreetMap', maxZoom:18,
    }).addTo(map);
    const mrk = L.marker([lat, lon], { icon:mkIcon(T, heading) }).addTo(map);
    mapRef.current = map; mrkRef.current = mrk; tilRef.current = tile;

    const ro = new ResizeObserver(() => map.invalidateSize());
    ro.observe(elRef.current);

    return () => {
      ro.disconnect();
      ghostsRef.current.forEach(g => g.remove());
      ghostsRef.current = [];
      map.remove(); mapRef.current = null; mrkRef.current = null; tilRef.current = null;
    };
  }, []);

  // Position update
  useEffect(() => {
    if (!mapRef.current || !mrkRef.current) return;
    mrkRef.current.setLatLng([lat, lon]);
    mrkRef.current.setIcon(mkIcon(T, heading));
    mapRef.current.panTo([lat, lon], { animate:true, duration:1.5 });
  }, [lat, lon, heading]);

  // Ghost markers
  useEffect(() => {
    if (!mapRef.current) return;
    rebuildGhosts(mapRef.current, ghostsRef, trail, T);
  }, [trail, T]);

  // Theme change
  const prevId = useRef(T.id);
  useEffect(() => {
    if (!mapRef.current || prevId.current === T.id) return;
    if (mrkRef.current) mrkRef.current.setIcon(mkIcon(T, hdgRef.current));
    prevId.current = T.id;
  }, [T]);

  return <div ref={elRef} style={{ width:'100%', height:'100%' }} />;
});

/* ── STATION PANEL ──────────────────────────────────────────────────────── */
function DelayBadge({ delay, T }) {
  if (delay === null) return null;
  const color = delay <= 0 ? T.ok : delay <= 15 ? T.warn : T.err;
  const label = delay <= 0 ? (T.up ? 'ON TIME' : 'On time') : `+${delay}m`;
  return (
    <span style={{
      fontSize:'9px', padding:'1px 5px', borderRadius:T.br,
      background:`${color}18`, color, border:`1px solid ${color}44`,
      fontFamily:T.mono, letterSpacing:'0.08em', flexShrink:0,
    }}>{label}</span>
  );
}

function TimeRow({ label, sched, actual, delay, tz, T, past }) {
  const actual_t = actual ? fmtTime(actual, tz) : null;
  const sched_t  = fmtTime(sched, tz);
  const hasActual = actual_t && actual_t !== sched_t;
  return (
    <div>
      <div style={{ fontSize:'9px', textTransform:'uppercase', letterSpacing:'0.1em', color:T.sub, marginBottom:'2px' }}>
        {u(T, label)}
      </div>
      {past && hasActual ? (
        <>
          <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
            <span style={{ fontSize:'12px', fontFamily:T.mono, color: delay > 0 ? T.warn : T.ok }}>{actual_t}</span>
            <DelayBadge delay={delay} T={T} />
          </div>
          <div style={{ fontSize:'10px', fontFamily:T.mono, color:T.sub, marginTop:'1px' }}>
            {u(T,'sched')} {sched_t}
          </div>
        </>
      ) : (
        <>
          <div style={{ fontSize:'12px', fontFamily:T.mono, color:T.text }}>{sched_t}</div>
          {hasActual && (
            <div style={{ display:'flex', alignItems:'center', gap:'4px', marginTop:'1px' }}>
              <span style={{ fontSize:'11px', fontFamily:T.mono, color: delay > 0 ? T.warn : T.ok }}>{actual_t}</span>
              <DelayBadge delay={delay} T={T} />
            </div>
          )}
        </>
      )}
    </div>
  );
}

function NowDivider({ T }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:'8px', margin:'4px 0 10px' }}>
      <div style={{ flex:1, height:'1px', background:T.border }} />
      <span style={{
        fontSize:'9px', letterSpacing:'0.16em', textTransform:'uppercase',
        color:T.accent, fontFamily:T.mono, flexShrink:0,
      }}>{u(T, 'now')}</span>
      <div style={{ flex:1, height:'1px', background:T.border }} />
    </div>
  );
}

function StationPanel({ stations, theme: T }) {
  const nowRef = useRef(null);

  const atIdx        = stations.findIndex(s => s.status === 'Station');
  const nextIdx      = atIdx >= 0 ? atIdx + 1 : stations.findIndex(s => s.status !== 'Departed');
  const dividerIdx   = atIdx >= 0 ? atIdx : nextIdx;
  const completedCnt = stations.filter(s => s.status === 'Departed').length;
  const remainingCnt = stations.length - completedCnt - (atIdx >= 0 ? 1 : 0);

  useEffect(() => {
    const t = setTimeout(() => nowRef.current?.scrollIntoView({ behavior:'smooth', block:'center' }), 200);
    return () => clearTimeout(t);
  }, [stations[0]?.code]);

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Delay chart */}
      <div style={{ padding:'12px 18px 0', flexShrink:0 }}>
        <DelayChart stations={stations} theme={T} />
      </div>

      {/* Header row */}
      <div style={{
        padding:'0 18px 10px', flexShrink:0,
        fontSize:'9px', letterSpacing:'0.14em', textTransform:'uppercase',
        color:T.sub, fontFamily:T.mono,
        display:'flex', justifyContent:'space-between',
      }}>
        <span>{u(T,'All Stations')}</span>
        <span style={{ display:'flex', gap:'10px' }}>
          <span>{completedCnt} {u(T,'done')}</span>
          <span style={{ color:T.border }}>·</span>
          <span>{remainingCnt} {u(T,'ahead')}</span>
        </span>
      </div>

      {/* Scrollable list */}
      <div style={{ flex:1, overflowY:'auto', padding:'0 18px 16px', fontFamily:T.font }}>
        {stations.length === 0 && (
          <div style={{ color:T.sub, fontSize:'13px', textAlign:'center', paddingTop:'40px' }}>
            {u(T,'No station data available.')}
          </div>
        )}

        {stations.map((st, i) => {
          const isDep  = st.status === 'Departed';
          const isCur  = st.status === 'Station';
          const isNext = i === nextIdx && !isCur;
          const isAnchor = isCur || (isNext && atIdx < 0);
          const showDiv  = i === dividerIdx && dividerIdx > 0 && completedCnt > 0;

          const dotColor = isCur ? T.ok : isNext ? T.accent : T.border;
          const dotSize  = (isCur || isNext) ? 11 : isDep ? 5 : 7;
          const arrDelay = delayMins(st.arr, st.schArr);
          const depDelay = delayMins(st.dep, st.schDep);

          return (
            <React.Fragment key={`${st.code}-${i}`}>
              {showDiv && <NowDivider T={T} />}
              <div ref={isAnchor ? nowRef : null} style={{ display:'flex', gap:'13px' }}>
                {/* Spine */}
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', width:'12px', flexShrink:0 }}>
                  <div style={{
                    width:dotSize, height:dotSize, borderRadius:'50%', background:dotColor,
                    flexShrink:0, marginTop:'4px',
                    boxShadow:(isCur||isNext) ? `0 0 7px ${dotColor}88` : 'none',
                    animation:isCur ? 'pulseGlow 2s ease-in-out infinite' : 'none',
                    color:dotColor,
                  }} />
                  {i < stations.length - 1 && (
                    <div style={{ flex:1, width:'1px', margin:'4px 0', minHeight:'26px',
                      background:isDep ? T.muted : T.border }} />
                  )}
                </div>

                {/* Content */}
                <div style={{ flex:1, paddingBottom:'18px', opacity:isDep ? 0.72 : 1 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:'8px' }}>
                    <div>
                      <div style={{
                        fontSize:(isCur||isNext) ? '14px' : '12px',
                        fontWeight:(isCur||isNext) ? 600 : 400,
                        color:(isCur||isNext) ? T.text : T.sub, lineHeight:1.3,
                      }}>{u(T, st.name)}</div>
                      <div style={{ fontSize:'9px', color:T.sub, fontFamily:T.mono, marginTop:'1px', letterSpacing:'0.06em' }}>
                        {st.code}{st.bus ? ' · BUS' : ''}{st.platform ? ` · PLT ${st.platform}` : ''}
                      </div>
                    </div>
                    {isCur && (
                      <span style={{
                        fontSize:'9px', padding:'2px 7px', borderRadius:T.br,
                        background:`${T.ok}18`, color:T.ok, border:`1px solid ${T.ok}44`,
                        fontFamily:T.mono, letterSpacing:'0.1em', whiteSpace:'nowrap', flexShrink:0,
                      }}>{u(T,'AT STATION')}</span>
                    )}
                    {isNext && (
                      <span style={{
                        fontSize:'9px', padding:'2px 7px', borderRadius:T.br,
                        background:T.accentDim, color:T.accent, border:`1px solid ${T.accent}44`,
                        fontFamily:T.mono, letterSpacing:'0.1em', whiteSpace:'nowrap', flexShrink:0,
                      }}>{u(T,'NEXT')}</span>
                    )}
                    {isDep && (arrDelay !== null || depDelay !== null) && (
                      <DelayBadge delay={
                        arrDelay !== null && depDelay !== null
                          ? Math.max(arrDelay, depDelay) : arrDelay ?? depDelay
                      } T={T} />
                    )}
                  </div>

                  <div style={{ display:'flex', gap:'18px', marginTop:'7px', flexWrap:'wrap' }}>
                    {st.schArr && (
                      <TimeRow label="Arr" sched={st.schArr} actual={st.arr}
                        delay={arrDelay} tz={st.tz} T={T} past={isDep} />
                    )}
                    {st.schDep && (
                      <TimeRow label="Dep" sched={st.schDep} actual={st.dep}
                        delay={depDelay} tz={st.tz} T={T} past={isDep} />
                    )}
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

/* ── TRAIN BANNER ───────────────────────────────────────────────────────── */
function Chip({ label, value, T, mono, bold, color }) {
  return (
    <div style={{ flexShrink:0 }}>
      <div style={{ fontSize:'9px', textTransform:'uppercase', letterSpacing:'0.12em', color:T.sub, marginBottom:'1px' }}>
        {u(T, label)}
      </div>
      <div style={{
        fontSize:bold ? '14px' : '12px', fontWeight:bold ? 600 : 400,
        fontFamily:mono ? T.mono : T.font, color:color || T.text,
      }}>{u(T, String(value))}</div>
    </div>
  );
}
function BDivider({ T }) {
  return <div style={{ width:'1px', height:'28px', background:T.border, flexShrink:0 }} />;
}

function TrainBanner({ train: tr, theme: T, isMobile }) {
  return (
    <div style={{
      padding:'8px 16px', background:T.elevated, borderBottom:`1px solid ${T.border}`,
      flexShrink:0, overflowX:'auto', WebkitOverflowScrolling:'touch',
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:'14px', minWidth:'max-content' }}>
        <Chip label="Route" value={tr.routeName} bold T={T} />
        <BDivider T={T} />
        <Chip label="Train #" value={`#${tr.trainNum}`} mono T={T} />
        <Chip label="Speed" value={`${tr.velocity} mph`} mono T={T} />
        <Chip label="Heading" value={tr.heading || '—'} mono T={T} />
        <Chip label="State" value={tr.trainState} mono T={T} color={tr.trainState === 'Active' ? T.ok : T.warn} />
        <BDivider T={T} />
        <Chip label="Origin" value={tr.origCode} mono T={T} />
        <span style={{ color:T.sub, fontSize:'13px', flexShrink:0 }}>→</span>
        <Chip label="Dest" value={tr.destCode} mono T={T} />
        {tr.statusMsg && tr.statusMsg.trim() && (
          <>
            <BDivider T={T} />
            <div style={{ fontSize:'11px', color:T.warn, fontFamily:T.mono, flexShrink:0 }}>
              ⚠ {u(T, tr.statusMsg)}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ── EMPTY STATE ────────────────────────────────────────────────────────── */
const EXAMPLES = ['3','5','49','91','48','7'];

function EmptyState({ theme: T, onPick }) {
  return (
    <div style={{
      flex:1, display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', gap:'10px', padding:'32px 24px',
    }}>
      <div style={{ fontSize:'44px', lineHeight:1 }}>🚂</div>
      <div style={{ fontSize:'17px', fontWeight:600, color:T.text, marginTop:'8px', fontFamily:T.font, textAlign:'center' }}>
        {u(T,'No train selected')}
      </div>
      <div style={{
        fontSize:'12px', color:T.sub, textAlign:'center', maxWidth:'320px',
        lineHeight:1.65, fontFamily:T.font,
      }}>
        {u(T,'Enter a train number above and press Track. The map shows live position with echo trail. The chart shows delay history per station.')}
      </div>
      <div style={{ display:'flex', gap:'7px', marginTop:'14px', flexWrap:'wrap', justifyContent:'center' }}>
        {EXAMPLES.map(n => (
          <button key={n} onClick={() => onPick(n)} style={{
            padding:'6px 14px', borderRadius:T.br,
            border:`1px solid ${T.accent}55`, color:T.accent,
            background:T.accentDim, fontFamily:T.mono, fontSize:'13px', cursor:'pointer',
          }}>#{n}</button>
        ))}
      </div>
      <div style={{ fontSize:'10px', color:T.sub, fontFamily:T.mono, marginTop:'4px', letterSpacing:'0.05em', textAlign:'center' }}>
        {u(T,'3=SW Chief · 5=CA Zephyr · 49=Lake Shore · 91=Silver Star')}
      </div>
    </div>
  );
}

/* ── APP ────────────────────────────────────────────────────────────────── */
function App() {
  const [themeId,   setThemeId]   = useState('dark');
  const [input,     setInput]     = useState('');
  const [rate,      setRate]      = useState(5);
  const [train,     setTrain]     = useState(null);
  const [trail,     setTrail]     = useState([]);
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState('');
  const [lastUpd,   setLastUpd]   = useState(null);
  const [cdwn,      setCdwn]      = useState(0);
  const [multi,     setMulti]     = useState(0);
  const [isMobile,  setIsMobile]  = useState(window.innerWidth < MOBILE_BP);
  const [mobileTab, setMobileTab] = useState('map');

  const T           = THEMES[themeId];
  const numRef      = useRef('');
  const ivRef       = useRef(null);
  const timerRef    = useRef(null);
  const rateRef     = useRef(rate);
  const prevPosRef  = useRef(null);
  const mapApiRef   = useRef(null);
  useEffect(() => { rateRef.current = rate; }, [rate]);

  // Resize detection
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < MOBILE_BP);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const doFetch = useCallback(async (num) => {
    if (!num) return;
    setLoading(true); setError('');
    try {
      const res  = await fetch(`${API}/trains/${num}`);
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      const keys = Object.keys(data);
      if (!keys.length) throw new Error('No active trains found for this number.');
      const list = data[keys[0]];
      if (!list?.length) throw new Error('Train not found or not currently active.');
      const newTrain = list[0];

      if (prevPosRef.current && newTrain.lat !== 0 &&
          (prevPosRef.current.lat !== newTrain.lat || prevPosRef.current.lon !== newTrain.lon)) {
        const snap = { lat:prevPosRef.current.lat, lon:prevPosRef.current.lon, heading:prevPosRef.current.heading };
        setTrail(prev => [...prev.slice(-(TRAIL_MAX - 1)), snap]);
      }
      prevPosRef.current = { lat:newTrain.lat, lon:newTrain.lon, heading:newTrain.heading };

      setTrain(newTrain);
      setMulti(list.length);
      setLastUpd(new Date());
      setCdwn(rateRef.current * 60);
    } catch(e) { setError(e.message); }
    finally    { setLoading(false); }
  }, []);

  const startTracking = useCallback((num) => {
    if (!num.trim()) return;
    numRef.current = num.trim();
    prevPosRef.current = null;
    setTrail([]);
    doFetch(numRef.current);
    clearInterval(ivRef.current);
    ivRef.current = setInterval(() => doFetch(numRef.current), rateRef.current * 60 * 1000);
  }, [doFetch]);

  const handleTrack = () => startTracking(input);
  const handlePick  = (n) => { setInput(n); startTracking(n); };

  const switchToMap = () => {
    setMobileTab('map');
    setTimeout(() => mapApiRef.current?.invalidateSize(), 80);
  };

  useEffect(() => {
    if (!lastUpd) return;
    setCdwn(rate * 60);
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => setCdwn(c => Math.max(0, c - 1)), 1000);
    return () => clearInterval(timerRef.current);
  }, [lastUpd, rate]);

  useEffect(() => {
    if (!numRef.current || !train) return;
    clearInterval(ivRef.current);
    ivRef.current = setInterval(() => doFetch(numRef.current), rate * 60 * 1000);
    setCdwn(rate * 60);
  }, [rate, doFetch]);

  useEffect(() => () => { clearInterval(ivRef.current); clearInterval(timerRef.current); }, []);

  const btn = (active, sm) => ({
    padding:       sm ? '4px 9px' : '7px 16px',
    borderRadius:  T.br || '4px',
    border:        `1px solid ${active ? T.accent : T.border}`,
    background:    active ? T.accentDim : 'transparent',
    color:         active ? T.accent : T.sub,
    fontFamily:    T.mono,
    fontSize:      sm ? '11px' : '13px',
    cursor:        'pointer',
    fontWeight:    active ? 600 : 400,
    letterSpacing: sm ? '0.04em' : 0,
    whiteSpace:    'nowrap',
  });

  const isLocated = train && (train.lat !== 0 || train.lon !== 0);

  /* ── MAP + STATIONS shared render ── */
  const mapEl = isLocated ? (
    <TrainMap ref={mapApiRef} lat={train.lat} lon={train.lon}
      heading={train.heading} trail={trail} theme={T} />
  ) : (
    <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center',
      justifyContent:'center', flexDirection:'column', gap:'10px' }}>
      <div style={{ fontSize:'32px' }}>📡</div>
      <div style={{ color:T.sub, fontFamily:T.mono, fontSize:'12px', textAlign:'center', padding:'0 20px' }}>
        {u(T,'Awaiting GPS signal…')}
      </div>
    </div>
  );

  const stationsEl = <StationPanel stations={train?.stations || []} theme={T} />;

  /* ── RENDER ── */
  return (
    <div style={{
      height:'100vh', display:'flex', flexDirection:'column',
      background:T.bg, color:T.text, fontFamily:T.font, overflow:'hidden',
    }}>
      {/* ══ HEADER ══ */}
      <header style={{
        padding: isMobile ? '8px 12px' : '10px 18px',
        borderBottom:`1px solid ${T.border}`, background:T.surface,
        flexShrink:0, display:'flex', flexDirection:'column',
        gap: isMobile ? '7px' : '9px',
      }}>
        {/* Row 1 — Logo + Themes */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:'8px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'8px', flexShrink:0 }}>
            <span style={{ fontSize:'16px' }}>🚂</span>
            <span style={{
              fontSize:'11px', fontWeight:700, letterSpacing:'0.18em',
              textTransform:'uppercase', color:T.accent, fontFamily:T.mono,
            }}>Amtrak Tracker</span>
          </div>
          {/* Themes — colored dots on mobile, labels on desktop */}
          <div style={{ display:'flex', gap:'5px', flexShrink:0 }}>
            {Object.values(THEMES).map(t => (
              isMobile ? (
                <button key={t.id} onClick={() => setThemeId(t.id)} title={t.label} style={{
                  width:'22px', height:'22px', borderRadius:'50%',
                  border:`2px solid ${t.id === themeId ? t.accent : T.border}`,
                  background: t.accent, cursor:'pointer', padding:0,
                  boxShadow: t.id === themeId ? `0 0 6px ${t.accent}88` : 'none',
                }} />
              ) : (
                <button key={t.id} onClick={() => setThemeId(t.id)} style={btn(t.id===themeId, true)}>
                  {t.label}
                </button>
              )
            ))}
          </div>
        </div>

        {/* Row 2 — Input + Rate + Status */}
        <div style={{ display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap' }}>
          {/* Input */}
          <input
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleTrack()}
            placeholder={u(T, isMobile ? 'Train # e.g. 3, 5, 49' : 'Train number — e.g. 3, 5, 49')}
            style={{
              padding:'7px 11px', borderRadius:T.br || '4px',
              border:`1px solid ${T.border}`, background:T.elevated,
              color:T.text, fontFamily:T.mono, fontSize:'13px',
              outline:'none', flex: isMobile ? '1 1 120px' : '0 0 220px',
              minWidth:0,
            }}
          />
          <button onClick={handleTrack} disabled={loading} style={{
            ...btn(false, false),
            background:loading ? T.muted : T.accent,
            color:      loading ? T.sub   : T.bg,
            border:     `1px solid ${T.accent}`,
            fontWeight:700, cursor:loading ? 'not-allowed' : 'pointer', flexShrink:0,
          }}>
            {loading ? u(T,'···') : u(T,'Track')}
          </button>

          {/* Divider — hidden on small mobile */}
          {!isMobile && <div style={{ width:'1px', height:'26px', background:T.border }} />}

          {/* Rate */}
          <div style={{ display:'flex', alignItems:'center', gap:'5px', flexShrink:0 }}>
            {!isMobile && (
              <span style={{ fontSize:'10px', textTransform:'uppercase', letterSpacing:'0.1em', color:T.sub }}>
                {u(T,'Every')}
              </span>
            )}
            {RATES.map(r => (
              <button key={r} onClick={() => setRate(r)} style={btn(r===rate, true)}>
                {r}m
              </button>
            ))}
          </div>

          {/* Status */}
          {lastUpd && (
            <div style={{ display:'flex', gap:'10px', marginLeft:'auto', alignItems:'center', flexShrink:0 }}>
              {multi > 1 && !isMobile && (
                <span style={{ fontSize:'10px', color:T.warn, fontFamily:T.mono }}>
                  {multi} trains · first shown
                </span>
              )}
              {!isMobile && (
                <div style={{ fontSize:'10px', fontFamily:T.mono, color:T.sub }}>
                  <span style={{ textTransform:'uppercase', letterSpacing:'0.08em' }}>{u(T,'Updated')} </span>
                  <span style={{ color:T.text }}>{lastUpd.toLocaleTimeString()}</span>
                </div>
              )}
              <div style={{ fontSize:'10px', fontFamily:T.mono, color:T.sub }}>
                <span style={{ textTransform:'uppercase', letterSpacing:'0.08em' }}>{u(T,'Next')} </span>
                <span style={{ color: cdwn < 60 ? T.warn : T.text }}>{fmtCountdown(cdwn)}</span>
              </div>
            </div>
          )}
        </div>
      </header>

      {/* ══ CONTENT ══ */}
      <main style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0 }}>
        {/* Error banner */}
        {error && (
          <div style={{
            padding:'7px 16px', background:`${T.err}18`,
            borderBottom:`1px solid ${T.err}44`,
            display:'flex', alignItems:'center', gap:'8px', flexShrink:0,
          }}>
            <span style={{ color:T.err, fontSize:'12px', fontFamily:T.mono }}>
              {u(T, `⚠ ${error}`)}
            </span>
            <button onClick={() => setError('')} style={{
              background:'none', border:'none', color:T.sub,
              cursor:'pointer', fontSize:'15px', marginLeft:'auto', lineHeight:1,
            }}>✕</button>
          </div>
        )}

        {/* Loading (first load) */}
        {loading && !train && (
          <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:'12px' }}>
            <div style={{
              width:'22px', height:'22px', borderRadius:'50%',
              border:`2px solid ${T.border}`, borderTopColor:T.accent,
              animation:'spin 0.75s linear infinite',
            }}/>
            <span style={{ color:T.sub, fontSize:'13px', fontFamily:T.mono }}>
              {u(T,'Locating train…')}
            </span>
          </div>
        )}

        {/* Empty state */}
        {!train && !loading && <EmptyState theme={T} onPick={handlePick} />}

        {/* Dashboard */}
        {train && (
          <div className="fade-in" style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0 }}>
            <TrainBanner train={train} theme={T} isMobile={isMobile} />

            {/* ── MOBILE: tab bar ── */}
            {isMobile && (
              <div style={{
                display:'flex', borderBottom:`1px solid ${T.border}`,
                background:T.surface, flexShrink:0,
              }}>
                {[
                  { id:'map',      label:'🗺  Map' },
                  { id:'stations', label:'📋  Stations' },
                ].map(tab => (
                  <button key={tab.id}
                    onClick={tab.id === 'map' ? switchToMap : () => setMobileTab('stations')}
                    style={{
                      flex:1, padding:'10px', border:'none',
                      background:'transparent', cursor:'pointer',
                      color: mobileTab === tab.id ? T.accent : T.sub,
                      fontFamily:T.mono, fontSize:'12px', fontWeight: mobileTab === tab.id ? 600 : 400,
                      borderBottom: mobileTab === tab.id ? `2px solid ${T.accent}` : '2px solid transparent',
                      transition:'all 0.15s',
                    }}
                  >{u(T, tab.label)}</button>
                ))}
              </div>
            )}

            {/* ── MOBILE: stacked panels via opacity (keeps Leaflet alive) ── */}
            {isMobile ? (
              <div style={{ flex:1, position:'relative', overflow:'hidden', minHeight:0 }}>
                <div style={{
                  position:'absolute', inset:0,
                  opacity: mobileTab === 'map' ? 1 : 0,
                  pointerEvents: mobileTab === 'map' ? 'auto' : 'none',
                  zIndex: mobileTab === 'map' ? 1 : 0,
                }}>
                  {/* Refresh overlay */}
                  {loading && (
                    <div style={{
                      position:'absolute', top:'10px', right:'10px', zIndex:9999,
                      background:`${T.surface}cc`, borderRadius:T.br,
                      padding:'5px 10px', border:`1px solid ${T.border}`,
                      display:'flex', alignItems:'center', gap:'6px',
                    }}>
                      <div style={{
                        width:'12px', height:'12px', borderRadius:'50%',
                        border:`1.5px solid ${T.border}`, borderTopColor:T.accent,
                        animation:'spin 0.75s linear infinite',
                      }}/>
                      <span style={{ fontSize:'10px', color:T.sub, fontFamily:T.mono }}>{u(T,'Refreshing…')}</span>
                    </div>
                  )}
                  {mapEl}
                </div>
                <div style={{
                  position:'absolute', inset:0,
                  opacity: mobileTab === 'stations' ? 1 : 0,
                  pointerEvents: mobileTab === 'stations' ? 'auto' : 'none',
                  zIndex: mobileTab === 'stations' ? 1 : 0,
                  overflow:'hidden',
                }}>
                  {stationsEl}
                </div>
              </div>
            ) : (
              /* ── DESKTOP: side-by-side ── */
              <div style={{ flex:1, display:'flex', overflow:'hidden', minHeight:0 }}>
                <div style={{ flex:'0 0 60%', position:'relative', minHeight:0 }}>
                  {loading && (
                    <div style={{
                      position:'absolute', top:'10px', right:'10px', zIndex:9999,
                      background:`${T.surface}cc`, borderRadius:T.br,
                      padding:'5px 10px', border:`1px solid ${T.border}`,
                      display:'flex', alignItems:'center', gap:'6px',
                    }}>
                      <div style={{
                        width:'12px', height:'12px', borderRadius:'50%',
                        border:`1.5px solid ${T.border}`, borderTopColor:T.accent,
                        animation:'spin 0.75s linear infinite',
                      }}/>
                      <span style={{ fontSize:'10px', color:T.sub, fontFamily:T.mono }}>{u(T,'Refreshing…')}</span>
                    </div>
                  )}
                  {mapEl}
                </div>
                <div style={{
                  flex:'0 0 40%', borderLeft:`1px solid ${T.border}`,
                  overflow:'hidden', display:'flex', flexDirection:'column', minHeight:0,
                }}>
                  {stationsEl}
                </div>
              </div>
            )}
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
